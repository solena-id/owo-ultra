name: Gửi thông báo Update lên Discord
on: 
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Gửi Webhook chuyên nghiệp
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GIF_URL: "https://files.catbox.moe/1wv0nh.gif"
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_ID: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          node -e "
            const https = require('https');
            
            // Xóa bỏ các thông báo commit trắng nếu có
            if (!process.env.COMMIT_MSG) process.exit(0);
            
            const payload = {
              username: 'OwO Farmer System',
              avatar_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png',
              embeds: [{
                title: '🚀 NEW UPDATE DEPLOYED!',
                url: process.env.COMMIT_URL,
                color: 5814783,
                description: 'A new bugfix or feature has just been released. Check out the changelog below.',
                fields: [
                  {
                    name: '📜 Changelog',
                    value: '\`\`\`md\\n' + process.env.COMMIT_MSG + '\\n\`\`\`',
                    inline: false
                  },
                  {
                    name: '👤 Author',
                    value: process.env.ACTOR,
                    inline: true
                  },
                  {
                    name: '🔗 Commit Hash',
                    value: '[' + process.env.COMMIT_ID.substring(0,7) + '](' + process.env.COMMIT_URL + ')',
                    inline: true
                  }
                ],
                image: {
                  url: process.env.GIF_URL
                },
                thumbnail: {
                  url: 'https://avatars.githubusercontent.com/' + process.env.ACTOR
                },
                footer: {
                  text: 'Powered by OwO Ultra Auto-Update',
                  icon_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'
                },
                timestamp: new Date().toISOString()
              }]
            };
            
            const data = JSON.stringify(payload);
            const url = new URL(process.env.WEBHOOK_URL);
            
            const req = https.request({
              hostname: url.hostname,
              port: 443,
              path: url.pathname + url.search,
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(data)
              }
            }, res => {
              console.log('Discord Webhook Status: ' + res.statusCode);
            });
            
            req.on('error', e => console.error(e));
            req.write(data);
            req.end();
          "
